name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test-lint:
    name: Test, Lint & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install .[dev]
          pip install tox pytest-cov pytest

      - name: Lint (Ruff/Black/Isort)
        run: |
          ruff check src/ tests/
          black --check src/ tests/
          isort --check-only src/ tests/

      - name: Type Check
        run: mypy src/

      - name: Tests with Coverage
        run: pytest --cov=src --cov-report=xml --cov-fail-under=60 tests/

      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@ba3875ecf642b2129de2b589510c81a8b53dbf4e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  security-scan:
    name: Security & Vulnerability Analysis
    runs-on: ubuntu-latest
    if: (github.actor != 'dependabot[bot]')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Semgrep Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          version: 'v0.69.2'

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Dependency Audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit

  docker-build-push:
    name: Docker Build & Push (Multi-Arch)
    needs: [test-lint, security-scan]
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (${{ matrix.platform }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployments/docker/Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ matrix.arch }}-latest
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke-test:
    name: Runtime Smoke Test
    needs: [docker-build-push]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Local Image for Testing
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployments/docker/Dockerfile
          push: false
          load: true
          tags: cyanide:test

      - name: Run Test Container
        run: |
          docker run -d \
            -e CYANIDE_HONEYPOT_HOSTNAME=server01 \
            -e CYANIDE_SERVER_OS_PROFILE=ubuntu \
            -e CYANIDE_SSH_PORT=2222 \
            -e CYANIDE_TELNET_PORT=2223 \
            -e CYANIDE_SMTP_PORT=2525 \
            -e CYANIDE_METRICS_PORT=9090 \
            -e 'CYANIDE_USERS=[{"user": "root", "pass": "admin"}]' \
            -p 2222:2222 -p 2223:2223 -p 2525:2525 -p 9090:9090 \
            --name cyanide-test \
            cyanide:test
          
      - name: Wait for Startup
        run: sleep 15

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Test Dependencies
        run: pip install requests asyncssh

      - name: Run Smoke Test Suite
        env:
          CYANIDE_SSH_PORT: 2222
          CYANIDE_TELNET_PORT: 2223
          CYANIDE_SMTP_PORT: 2525
          CYANIDE_METRICS_PORT: 9090
        run: python3 tests/integration/smoke_test.py

      - name: Cleanup & Logs
        if: always()
        run: |
          docker logs cyanide-test || true
          docker rm -f cyanide-test || true
