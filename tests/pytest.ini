[pytest]
asyncio_mode = auto
log_cli = true
log_cli_level = INFO
testpaths = .
python_files = test_*.py
addopts = -v --cov=../src --cov-config=.coveragerc --cov-report=term-missing:skip-covered --color=yes --tb=short
markers =
    integration: mark test as integration test
    slow: mark test as slow
