honeypot:
  # Hostname reported by the honeypot
  hostname: server01
  
  # Quarantine max size in MB
  quarantine_max_size_mb: 500

server:
  # IP address to bind to
  host: 0.0.0.0
  
  # OS Consistency Profile
  os_profile: random
  
  # Maximum total concurrent sessions
  max_sessions: 100
  
  # Maximum concurrent sessions per IP
  max_sessions_per_ip: 5
  
  # Session timeout in seconds
  session_timeout: 300

users:
  - user: root
    pass: admin
  - user: admin
    pass: admin
  - user: user
    pass: "123456"

metrics:
  enabled: true
  port: 9090

ml:
  enabled: true
  metrics_port: 9090
  online_learning: false
  retraining_interval_days: 7

ssh:
  enabled: true
  listen_port: 2222
  rsa_keying: true
  backend_mode: emulated

telnet:
  enabled: true
  listen_port: 2223
  backend_mode: emulated

smtp:
  enabled: true
  listen_port: 2525
  target_host: 127.0.0.1
  target_port: 25255

output:
  json_log: true

cleanup:
  enabled: true
  interval: 3600
  retention_days: 7
  retention_days: 7

virustotal:
  enabled: true
  # api_key: 

otel:
  enabled: true
  exporter: otlp
  endpoint: http://localhost:4318/v1/traces
