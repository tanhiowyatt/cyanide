static:
  /etc/issue:
    content: "Debian GNU/Linux {{ version_id }} \\n \\l\n"
  /etc/hostname:
    content: "{{ hostname }}\n"
  /etc/hosts:
    content: |
      127.0.0.1 localhost
      127.0.1.1 {{ hostname }}

      # The following lines are desirable for IPv6 capable hosts
      ::1     ip6-localhost ip6-loopback
      fe00::0 ip6-localnet
      ff00::0 ip6-mcastprefix
      ff02::1 ip6-allnodes
      ff02::2 ip6-allrouters
  /etc/os-release:
    content: |
      PRETTY_NAME="Debian GNU/Linux {{ version_id }} (bullseye)"
      NAME="Debian GNU/Linux"
      VERSION_ID="{{ version_id }}"
      VERSION="{{ version_id }} (bullseye)"
      ID={{ os_id }}
      HOME_URL="https://www.debian.org/"
      SUPPORT_URL="https://www.debian.org/support"
      BUG_REPORT_URL="https://bugs.debian.org/"
  /etc/passwd:
    type: static
    source: "debian/root/etc/passwd.txt"
  /etc/group:
    source: "debian/root/etc/group"
  /etc/shadow:
    source: "debian/root/etc/shadow"
  /etc/shells:
    source: "debian/root/etc/shells"
  /etc/ssh/sshd_config:
    source: "debian/root/etc/ssh/sshd_config"
  /home/admin/.bashrc:
    source: "debian/root/home/admin/.bashrc"
  /root/.bashrc:
    source: "debian/root/root/.bashrc"
  /bin/**:
    source: "debian/root/bin/"
  /sbin/**:
    source: "debian/root/sbin/"
  /usr/**:
    source: "debian/root/usr/"
  /etc/**:
    source: "debian/root/etc/"
  /var/**:
    source: "debian/root/var/"
  /lib/**:
    source: "debian/root/lib/"
  /lib64/**:
    source: "debian/root/lib64/"
  /home/**:
    source: "debian/root/home/"
  /root/**:
    source: "debian/root/root/"
  /boot/**:
    source: "debian/root/boot/"
  /dev/**:
    source: "debian/root/dev/"
  /media/**:
    source: "debian/root/media/"
  /mnt/**:
    source: "debian/root/mnt/"
  /opt/**:
    source: "debian/root/opt/"
  /run/**:
    source: "debian/root/run/"
  /srv/**:
    source: "debian/root/srv/"
  /tmp/**:
    source: "debian/root/tmp/"
