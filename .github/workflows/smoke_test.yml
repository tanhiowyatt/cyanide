name: Smoke Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: cyanide:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Container
        run: |
          docker run -d \
            -e CYANIDE_HONEYPOT_HOSTNAME=smoke-test \
            -p 2222:2222 \
            -p 2223:2223 \
            -p 2525:2525 \
            -p 9090:9090 \
            --name cyanide \
            cyanide:latest

      - name: Wait for services (Health Check)
        run: |
          echo "[*] Waiting for services to initialize..."
          for i in {1..20}; do
            if docker logs cyanide 2>&1 | grep -q "Starting Cyanide Honeypot"; then
              echo "[+] Honeypot is ready!"
              break
            fi
            if [[ $i -eq 20 ]]; then
              echo "[!] Timeout waiting for services"
              docker logs cyanide
              exit 1
            fi
            sleep 3
          done

      - name: Install Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests asyncssh telnetlib3

      - name: Run Smoke Test Script
        run: |
          python3 src/cyanide/tests/integration/smoke_test.py

      - name: Capture logs on failure
        if: failure()
        run: |
          docker logs cyanide > cyanide-docker-error.log

      - name: Save Error Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cyanide-smoke-test-logs
          path: cyanide-docker-error.log
          retention-days: 7

      - name: Clean up
        if: always()
        run: |
          docker rm -f cyanide || true
