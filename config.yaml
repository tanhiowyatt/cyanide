
log_path: "logs"
max_sessions: 100
session_timeout: 300

ssh:
  enabled: true
  port: 2222  # Map to 22 in Docker
  version: "OpenSSH_8.2p1 Ubuntu-4ubuntu0.5"

telnet:
  enabled: true
  port: 2223  # Map to 23 in Docker

services:
  http:
    enabled: true
    port: 8080 # 80 in prod
  mysql:
    enabled: true
    port: 33060 # 3306 in prod

users:
  - user: "root"
    pass: "P@ssw0rd123"
    uid: 0
  - user: "admin"
    pass: "admin"
    uid: 1000
  - user: "ubuntu"
    pass: "ubuntu"
    uid: 1000
  - user: "user"
    pass: "123456"
    uid: 1000

dashboard:
  enabled: true
  host: "0.0.0.0"
  port: 8000

telegram:
  enabled: false
  bot_token: ""
  chat_id: ""
